# Email Governance Map — Starter Template
# ==========================================
# This file is generated and maintained by the email-inbox-manager skill.
# It captures YOUR personal email organization rules so that Claude (or any 
# team member) knows exactly how to handle your email.
#
# You can edit this file directly — it's designed to be human-readable.
# The skill will pick up your changes on the next run.
#
# Last updated: PENDING_ONBOARDING
# Account: PENDING_ONBOARDING

account:
  email: ""
  onboarding_completed: false
  onboarding_date: null
  confidence_mode: conservative  # conservative | moderate | autonomous
  # conservative: always ask before acting
  # moderate: auto-handle high-confidence rules, ask for the rest
  # autonomous: auto-handle everything above the confidence threshold
  status: pending_review  # pending_review | active
  team:
    has_team: false          # set during onboarding
    review_period_days: 5    # how long the team gets to review before changes go live
    review_deadline: null    # auto-set when migration plan is shared
    migration_plan_shared: false

# ─────────────────────────────────────────
# THE BOX SYSTEM
# ─────────────────────────────────────────
# Incoming email gets triaged into one of these boxes,
# or auto-filed if it's a completed/informational item.

triage_boxes:
  box_1_waiting:
    description: "Waiting for a reply from someone else"
    label: "Box 1 - Waiting"
    check_cadence: "daily"
    nudge_rules:
      default:
        nudge_after_days: [3, 7, 14]
        max_nudges: 3
        nudge_style: "polite"

  box_2_action:
    description: "I need to do something about this"
    label: "Box 2 - Action Needed"

  box_3_review:
    description: "I need to read/review this, but no action required"
    label: "Box 3 - Review"

  auto_filed:
    description: "Informational updates — acknowledged, closed out, filed"
    report_cadence: "weekly"

  to_trash:
    description: "Quarantine for deletion candidates. The skill NEVER deletes — you empty this label manually in Gmail on your own cadence."
    label: "To Trash"
    review_cadence: "weekly"

# ─────────────────────────────────────────
# LABEL TAXONOMY
# ─────────────────────────────────────────
# Your consolidated folder/label structure.
# Populated during onboarding.

taxonomy:
  active_labels: []
  label_migrations: []
  archived_labels: []

# ─────────────────────────────────────────
# SENDER PROFILES
# ─────────────────────────────────────────
# Learned patterns about specific senders.
# Built up over time through triage sessions.

sender_profiles: []

# ─────────────────────────────────────────
# NEWSLETTERS
# ─────────────────────────────────────────

newsletters:
  subscribed: []
  unsubscribed: []
  digest_settings:
    enabled: false
    delivery: "weekly"
    day: "Monday"
    format: "summary"

# ─────────────────────────────────────────
# TRIAGE RULES
# ─────────────────────────────────────────
# Evaluated in order — first match wins.
# Each rule has an approval_mode:
#   always_ask — confirm every time (default for new rules)
#   confirm    — apply but report it
#   auto       — apply silently, include in weekly report

triage_rules: []

# ─────────────────────────────────────────
# COMMUNICATION PREFERENCES
# ─────────────────────────────────────────

communication:
  uncertainty_threshold: 0.7
  ask_method: "batch"
  batch_cadence: "end_of_session"

  weekly_report:
    enabled: true
    day: "Monday"
    include:
      - auto_filed_summary
      - box_1_status
      - nudges_sent
      - newsletters_digested
      - rules_suggested

  dashboard:
    enabled: false
    format: "react"

# ─────────────────────────────────────────
# SCHEDULES
# ─────────────────────────────────────────
# Automated runs via RemoteTrigger (persistent)
# or CronCreate (session-only). Set up during
# onboarding Phase 5.

schedules:
  morning_triage:
    enabled: false
    cron: "3 9 * * 1-5"          # Weekdays ~9am
    mode: triage
    delivery: "draft_email"       # draft_email | slack | file
    auto_handle: true             # apply auto rules without asking
    notify_on_uncertain: true     # flag emails needing human review
  nudge_check:
    enabled: false
    cron: "7 14 * * 1-5"          # Weekdays ~2pm
    mode: nudge_check
    delivery: "draft_email"
  weekly_report:
    enabled: false
    cron: "57 8 * * 1"            # Monday ~9am
    mode: weekly_report
    delivery: "draft_email"
    recipients: []                # email addresses to cc
  newsletter_digest:
    enabled: false
    cron: "13 7 * * 1"            # Monday ~7am
    mode: newsletter_digest
    delivery: "draft_email"

# ─────────────────────────────────────────
# HISTORICAL CLEANUP
# ─────────────────────────────────────────
# Record of the Phase 0.5 bulk cleanup pass performed during onboarding
# (or later, if re-run). Useful for answering "where did my old X emails go?"

historical_cleanup:
  performed: false
  date: null
  categories: []   # e.g.:
                   # - name: old_newsletters
                   #   age_threshold: "2y"
                   #   action: to_trash
                   #   query: "older_than:2y category:promotions has:unsubscribe"
                   #   count: 2347
  skipped_categories: []

# ─────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────
# Every rule change gets logged here so your team
# can see what changed and why. Automated runs also
# log here with what was processed.

changelog: []
